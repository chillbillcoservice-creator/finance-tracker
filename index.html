<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="description" content="A simple app to manage rent.">
  <meta name="theme-color" content="#0b101f">
  <link rel="manifest" href="manifest.json">
  <title>RENT</title>
  <script type="module" crossorigin src="/finance-tracker/assets/index-DPAnMfr1.js"></script>
  <link rel="stylesheet" crossorigin href="/finance-tracker/assets/index-1s-VTQ4D.css">
</head>
<body>
  
  <div class="app-container">
    
    <!-- Sidebar Navigation (Desktop) -->
    <aside class="sidebar">
      <div class="logo-container">
        <span class="logo-text">RENT</span>
      </div>

      <nav style="flex: 1;">
        <ul class="nav-links">
          <li class="nav-item">
            <a class="nav-link active" data-tab="dashboard">
              <svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/></svg>
              <span>Summary</span>
            </a>
          </li>
          <li class="nav-item">
            <a class="nav-link" data-tab="rental">
              <svg viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
              <span>Tenants</span>
            </a>
          </li>
        </ul>
      </nav>
    </aside>
    
    <!-- Mobile Bottom Navigation -->
    <nav class="mobile-nav">
      <a class="mobile-nav-link active" data-tab="dashboard">
        <svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/></svg>
        <span>Summary</span>
      </a>
      <a class="mobile-nav-link" data-tab="rental">
        <svg viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
        <span>Tenants</span>
      </a>
    </nav>

    <!-- Main Content -->
    <main class="main-content">
      
      <!-- Top header bar -->
      <header class="page-header" style="display: flex; justify-content: space-between; align-items: center;">
        <div class="page-title">
          <h1 id="current-view-title">Summary</h1>
        </div>
        <div class="header-actions">
          <div class="date-badge" style="background: rgba(255,255,255,0.05); padding: 0.5rem 1rem; border-radius: 8px; border: 1px solid rgba(255,255,255,0.1); font-size: 0.85rem; font-weight: 600; color: #8b9dc3;">
            <span id="header-date">--</span>
          </div>
        </div>
      </header>

      <!-- VIEW: DASHBOARD -->
      <section id="view-dashboard" class="tab-content active">
        <!-- New Rent Card based on screenshot -->
        <div class="rent-status-card" id="rent-status-card">
          <div class="rent-card-content">
            <div class="rent-card-header">
              <span class="rent-title">RENTAL INCOME<br>(COLLECTED)</span>
              <div class="rent-icon">
                <svg viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
              </div>
            </div>
            <div class="rent-value" id="dash-monthly-rent">Rs. 0.00</div>
            <div class="rent-status" id="dash-rental-status">All Collected</div>
          </div>
        </div>
      </section>

      <!-- VIEW: RENTALS (Tenants) -->
      <section id="view-rental" class="tab-content">
        <div class="section-header" style="display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 0.75rem;">
          <h2 style="margin-bottom: 0;">Tenants</h2>
          <button class="btn btn-primary" id="btn-add-rental">
            <svg viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
            Add Tenant
          </button>
        </div>

        <div class="list-container" id="rentals-list">
          <!-- Injected via JS -->
        </div>
      </section>

    </main>
    
  </div>

  <!-- MODAL: ADD/EDIT RENTAL -->
  <div class="modal-overlay" id="modal-rental">
    <div class="modal-container">
      <div class="modal-header">
        <h3 class="modal-title" id="rental-modal-title">Add Tenant</h3>
        <button class="modal-close" onclick="closeModal('modal-rental')">
          <svg viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
      </div>
      <form id="form-rental">
        <input type="hidden" id="rental-id">
        <div class="modal-body">
          <div class="form-group">
            <label class="form-label" for="rental-tenant">Tenant Name</label>
            <input type="text" id="rental-tenant" class="form-input" required>
          </div>
          <div class="form-group">
            <label class="form-label" for="rental-property">Property / Unit</label>
            <input type="text" id="rental-property" class="form-input" required>
          </div>
          <div class="form-group">
            <label class="form-label" for="rental-rent">Monthly Rent (Rs.)</label>
            <input type="number" id="rental-rent" class="form-input" required min="1" step="any">
          </div>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" onclick="closeModal('modal-rental')">Cancel</button>
          <button type="submit" class="btn btn-primary">Save Tenant</button>
        </div>
      </form>
    </div>
  </div>

  <!-- MODAL: RENT PAYMENT -->
  <div class="modal-overlay" id="modal-rent-payment">
    <div class="modal-container">
      <div class="modal-header">
        <h3 class="modal-title">Record Rent Payment</h3>
        <button class="modal-close" onclick="closeModal('modal-rent-payment')">
          <svg viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
      </div>
      <form id="form-rent-payment">
        <input type="hidden" id="rent-payment-rental-id">
        <div class="modal-body">
          <div class="form-group">
            <label class="form-label" for="rent-payment-amount">Rent Amount Paid (Rs.)</label>
            <input type="number" id="rent-payment-amount" class="form-input" required min="1" step="any">
          </div>
          <div class="form-group">
            <label class="form-label" for="rent-payment-month">For Month</label>
            <input type="month" id="rent-payment-month" class="form-input" required>
          </div>
          <div class="form-group">
            <label class="form-label" for="rent-payment-date">Payment Date</label>
            <input type="date" id="rent-payment-date" class="form-input" required>
          </div>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" onclick="closeModal('modal-rent-payment')">Cancel</button>
          <button type="submit" class="btn btn-primary">Record Rent</button>
        </div>
      </form>
    </div>
  </div>

</body>
</html>
